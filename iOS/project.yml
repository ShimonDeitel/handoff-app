name: Handoff
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Handoff:
    type: application
    platform: iOS
    sources:
      - path: Handoff
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.handoff
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Handoff/Info.plist
        CODE_SIGN_ENTITLEMENTS: Handoff/Handoff.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  HandoffTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HandoffTests
      - path: Handoff.storekit
    dependencies:
      - target: Handoff
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.handoff.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Handoff:
    build:
      targets:
        Handoff: all
        HandoffTests: [test]
    run:
      config: Debug
      storeKitConfiguration: Handoff.storekit
    test:
      config: Debug
      storeKitConfiguration: Handoff.storekit
      targets:
        - HandoffTests
    archive:
      config: Release
